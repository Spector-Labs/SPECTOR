<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spector • Glasses Mode</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { margin:0; background:#0F0F0F; color:#E8E8E8; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        #active-chunk { 
            font-size: 26px; 
            line-height: 1.5; 
            text-align: center; 
            padding: 60px 40px; 
            min-height: 55vh;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s ease;
        }
        .controls { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 100; }
        .controls button { background: rgba(255,255,255,0.08); border: none; color: #E8E8E8; padding: 14px 20px; border-radius: 9999px; font-size: 18px; cursor: pointer; }
        .gesture-hint { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); font-size: 13px; color: rgba(232,213,183,0.5); }
        #voice-indicator { position: absolute; top: 20px; right: 20px; font-size: 13px; padding: 6px 14px; background: rgba(232,213,183,0.1); border-radius: 9999px; display: none; }
    </style>
</head>
<body>
    <div id="active-chunk"></div>
    <div class="gesture-hint">Tap • Swipe left/right • Say “next”, “pause”, “slower”</div>
    <div id="voice-indicator">🎙 Listening...</div>

    <div class="controls">
        <button id="rewind-btn">⤆</button>
        <button id="play-btn">▶</button>
        <button id="forward-btn">⤇</button>
    </div>

    <script>
        let scriptText = localStorage.getItem('spectorScript') || "Welcome to Spector. Paste your script to begin.";
        let chunks = [];
        let currentIndex = 0;
        let isPlaying = false;
        let interval = null;
        let speed = 2600;
        let currentMode = 'comfort';
        let breathingFrame = null;
        let recognition = null;
        let isListening = false;

        function hybridChunk(text) {
            const sentences = text.match(/[^.!?]+[.!?]+/g);
            if (sentences && sentences.length > 3) return sentences;
            return text.split(/\s+/).reduce((acc, word, i) => {
                if (i % 7 === 0) acc.push('');
                acc[acc.length-1] += word + ' ';
                return acc;
            }, []);
        }

        function renderChunks() {
            chunks = hybridChunk(scriptText);
            updateActiveChunk();
        }

        function updateActiveChunk() {
            const el = document.getElementById('active-chunk');
            el.textContent = chunks[currentIndex] || '';
            el.style.opacity = '1';
            el.style.transform = 'translate(0,0)';
        }

        function startPlayback() {
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸';
            interval = setInterval(() => {
                if (currentIndex < chunks.length - 1) {
                    currentIndex++;
                    updateActiveChunk();
                } else {
                    stopPlayback();
                }
            }, speed);
        }

        function stopPlayback() {
            isPlaying = false;
            document.getElementById('play-btn').textContent = '▶';
            clearInterval(interval);
        }

        function togglePlay() {
            isPlaying ? stopPlayback() : startPlayback();
        }

        // Touch Gestures
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        document.addEventListener('touchend', e => {
            const diffX = touchStartX - e.changedTouches[0].screenX;
            const diffY = touchStartY - e.changedTouches[0].screenY;

            if (Math.abs(diffX) > 60) {
                if (diffX > 0 && currentIndex > 0) currentIndex--;
                else if (diffX < 0 && currentIndex < chunks.length - 1) currentIndex++;
                updateActiveChunk();
            } else if (Math.abs(diffY) > 60) {
                speed = diffY > 0 ? Math.max(1400, speed - 500) : Math.min(4000, speed + 500);
                if (isPlaying) { stopPlayback(); startPlayback(); }
            } else {
                togglePlay();
            }
        });

        // Voice Commands + Adaptive Pacing
        function setupVoiceCommands() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                console.log('Voice heard:', transcript);

                if (transcript.includes('play') || transcript.includes('start')) {
                    if (!isPlaying) startPlayback();
                } 
                else if (transcript.includes('pause') || transcript.includes('stop')) {
                    if (isPlaying) stopPlayback();
                } 
                else if (transcript.includes('next')) {
                    if (currentIndex < chunks.length - 1) currentIndex++;
                    updateActiveChunk();
                } 
                else if (transcript.includes('back') || transcript.includes('previous')) {
                    if (currentIndex > 0) currentIndex--;
                    updateActiveChunk();
                } 
                else if (transcript.includes('slower') || transcript.includes('slow down')) {
                    speed = Math.min(4200, speed + 600);
                    if (isPlaying) { stopPlayback(); startPlayback(); }
                } 
                else if (transcript.includes('faster') || transcript.includes('speed up')) {
                    speed = Math.max(1400, speed - 600);
                    if (isPlaying) { stopPlayback(); startPlayback(); }
                } 
                else if (transcript.includes('comfort')) {
                    applyMode('comfort');
                } 
                else if (transcript.includes('focus')) {
                    applyMode('focus');
                }
            };

            recognition.onerror = () => {
                document.getElementById('voice-indicator').style.display = 'none';
            };
        }

        function toggleVoiceListening() {
            if (!recognition) return;
            const indicator = document.getElementById('voice-indicator');

            if (!isListening) {
                recognition.start();
                isListening = true;
                indicator.style.display = 'block';
            } else {
                recognition.stop();
                isListening = false;
                indicator.style.display = 'none';
            }
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
            if (e.key.toLowerCase() === 'r' && currentIndex > 0) { currentIndex--; updateActiveChunk(); }
            if (e.key.toLowerCase() === 'v') toggleVoiceListening(); // Press V to toggle voice
        });

        function init() {
            renderChunks();
            document.getElementById('play-btn').addEventListener('click', togglePlay);
            document.getElementById('rewind-btn').addEventListener('click', () => { if (currentIndex > 0) currentIndex--; updateActiveChunk(); });
            document.getElementById('forward-btn').addEventListener('click', () => { if (currentIndex < chunks.length - 1) currentIndex++; updateActiveChunk(); });

            setupVoiceCommands();

            // Start with voice listening on by default (user can toggle with V key or tap)
            setTimeout(() => {
                const indicator = document.getElementById('voice-indicator');
                if (recognition) {
                    recognition.start();
                    isListening = true;
                    indicator.style.display = 'block';
                }
            }, 1200);
        }

        window.onload = init;
    </script>
</body>
</html>
