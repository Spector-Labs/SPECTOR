<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spector • Glasses Mode</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            background: #0F0F0F;
            color: #E8E8E8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        #active-chunk {
            font-size: 32px;
            line-height: 1.5;
            text-align: center;
            padding: 80px 60px;
            min-height: 60vh;
            transition: opacity 0.4s ease, transform 0.35s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .controls {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 14px;
            z-index: 100;
        }
        .controls button {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #E8E8E8;
            padding: 16px 22px;
            border-radius: 9999px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .controls button:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.95);
        }
        .mode-switcher {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(255,255,255,0.06);
            border-radius: 9999px;
            padding: 4px;
        }
        .mode-btn {
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 14px;
            border: none;
            background: transparent;
            color: #aaa;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #E8D5B7;
            color: #111;
            font-weight: 600;
        }
        .gesture-hint {
            position: absolute;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: rgba(232,213,183,0.45);
        }
    </style>
</head>
<body>
    <div id="active-chunk"></div>

    <div class="mode-switcher">
        <button class="mode-btn active" data-mode="comfort">Comfort</button>
        <button class="mode-btn" data-mode="focus">Focus</button>
    </div>

    <div class="gesture-hint">Tap to play/pause • Swipe to navigate</div>

    <div class="controls">
        <button id="rewind-btn">⤆</button>
        <button id="play-btn">▶</button>
        <button id="forward-btn">⤇</button>
    </div>

    <script>
        let scriptText = localStorage.getItem('spectorScript') || "Welcome to Spector. Paste your script to begin.";
        let chunks = [];
        let currentIndex = 0;
        let isPlaying = false;
        let interval = null;
        let speed = 2600;
        let currentMode = 'comfort';

        function hybridChunk(text) {
            const sentences = text.match(/[^.!?]+[.!?]+/g);
            if (sentences && sentences.length > 2) return sentences;
            return text.split(/\s+/).reduce((acc, word, i) => {
                if (i % 7 === 0) acc.push('');
                acc[acc.length-1] += word + ' ';
                return acc;
            }, []);
        }

        function renderChunks() {
            chunks = hybridChunk(scriptText);
            updateActiveChunk();
        }

        function updateActiveChunk() {
            const el = document.getElementById('active-chunk');
            el.style.transition = 'none';
            el.style.opacity = '0';
            
            setTimeout(() => {
                el.textContent = chunks[currentIndex] || '';
                el.style.transition = 'opacity 0.4s ease, transform 0.35s cubic-bezier(0.23, 1, 0.32, 1)';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 80);
        }

        function startPlayback() {
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸';
            interval = setInterval(() => {
                if (currentIndex < chunks.length - 1) {
                    currentIndex++;
                    updateActiveChunk();
                } else {
                    stopPlayback();
                }
            }, speed);
        }

        function stopPlayback() {
            isPlaying = false;
            document.getElementById('play-btn').textContent = '▶';
            clearInterval(interval);
        }

        function togglePlay() {
            isPlaying ? stopPlayback() : startPlayback();
        }

        // Touch Gestures
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        document.addEventListener('touchend', e => {
            const diffX = touchStartX - e.changedTouches[0].screenX;
            const diffY = touchStartY - e.changedTouches[0].screenY;

            if (Math.abs(diffX) > 70) {
                if (diffX > 0 && currentIndex > 0) currentIndex--;
                else if (diffX < 0 && currentIndex < chunks.length - 1) currentIndex++;
                updateActiveChunk();
            } else if (Math.abs(diffY) > 70) {
                speed = diffY > 0 ? Math.max(1500, speed - 500) : Math.min(4000, speed + 500);
                if (isPlaying) { stopPlayback(); startPlayback(); }
            } else {
                togglePlay();
            }
        });

        // Mode Switcher
        function applyMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
        }

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => applyMode(btn.dataset.mode));
        });

        // Keyboard
        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
            if (e.key.toLowerCase() === 'r' && currentIndex > 0) { currentIndex--; updateActiveChunk(); }
        });

        function init() {
            renderChunks();
            document.getElementById('play-btn').addEventListener('click', togglePlay);
            document.getElementById('rewind-btn').addEventListener('click', () => { if (currentIndex > 0) currentIndex--; updateActiveChunk(); });
            document.getElementById('forward-btn').addEventListener('click', () => { if (currentIndex < chunks.length - 1) currentIndex++; updateActiveChunk(); });
        }

        window.onload = init;
    </script>
</body>
</html>
