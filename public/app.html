<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spector • Glasses Mode</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { margin:0; overflow:hidden; background:#0F0F0F; color:#E8E8E8; font-family:system-ui, -apple-system, sans-serif; }
        #active-chunk { 
            font-size: 28px; 
            line-height: 1.45; 
            text-align: center; 
            padding: 40px 30px; 
            min-height: 60vh; 
            transition: transform 0.25s ease, opacity 0.3s ease;
        }
        .gesture-hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 13px; color: rgba(232,213,183,0.6); pointer-events: none; }
        .swipe-flash { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    </style>
</head>
<body>
    <div id="active-chunk"></div>
    <div class="gesture-hint">Tap to play • Swipe to navigate</div>
    <div id="swipe-flash" class="swipe-flash"></div>

    <!-- Controls -->
    <div id="controls" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:12px; opacity:1; transition:opacity 0.4s;">
        <button id="rewind-btn">⤆</button>
        <button id="play-btn">▶</button>
        <button id="forward-btn">⤇</button>
    </div>

    <script>
        let scriptText = localStorage.getItem('spectorScript') || "Paste your script to begin...";
        let chunks = [];
        let currentIndex = 0;
        let isPlaying = false;
        let interval = null;
        let speed = 2600; // default medium
        let currentMode = 'comfort';
        let breathingFrame = null;
        let velocityX = 0, velocityY = 0;

        function hybridChunk(text) {
            return text.match(/[^.!?]+[.!?]+/g) || text.split(/\s+/).reduce((acc, word, i) => {
                if (i % 8 === 0) acc.push('');
                acc[acc.length-1] += word + ' ';
                return acc;
            }, []);
        }

        function renderChunks() {
            chunks = hybridChunk(scriptText);
            updateActiveChunk();
        }

        function updateActiveChunk() {
            const chunkEl = document.getElementById('active-chunk');
            chunkEl.textContent = chunks[currentIndex] || '';
            chunkEl.style.opacity = 1;
            chunkEl.style.transform = 'translate(0, 0)';
        }

        function startPlayback() {
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸';
            interval = setInterval(() => {
                if (currentIndex < chunks.length - 1) {
                    currentIndex++;
                    updateActiveChunk();
                } else {
                    stopPlayback();
                }
            }, speed);
        }

        function stopPlayback() {
            isPlaying = false;
            document.getElementById('play-btn').textContent = '▶';
            clearInterval(interval);
        }

        function togglePlay() {
            isPlaying ? stopPlayback() : startPlayback();
        }

        // Touch Gestures
        let touchStartX = 0, touchStartY = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });

        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > 50) {
                // Horizontal swipe
                if (diffX > 0) {
                    // Swipe left → Rewind
                    if (currentIndex > 0) currentIndex--;
                    showSwipeFlash('←');
                } else {
                    // Swipe right → Forward
                    if (currentIndex < chunks.length - 1) currentIndex++;
                    showSwipeFlash('→');
                }
                updateActiveChunk();
            } else if (Math.abs(diffY) > 50) {
                // Vertical swipe
                if (diffY > 0) {
                    speed = Math.max(1200, speed - 400); // faster
                    showSwipeFlash('↑');
                } else {
                    speed = Math.min(4200, speed + 400); // slower
                    showSwipeFlash('↓');
                }
                if (isPlaying) {
                    stopPlayback();
                    startPlayback();
                }
            } else {
                // Tap
                togglePlay();
            }
        });

        function showSwipeFlash(dir) {
            const flash = document.getElementById('swipe-flash');
            flash.textContent = dir;
            flash.style.opacity = 0.7;
            setTimeout(() => flash.style.opacity = 0, 400);
        }

        // Keyboard fallback
        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
            if (e.key.toLowerCase() === 'r' && currentIndex > 0) { currentIndex--; updateActiveChunk(); }
        });

        function init() {
            renderChunks();
            document.getElementById('play-btn').addEventListener('click', togglePlay);
        }

        window.onload = init;
    </script>
</body>
</html>
