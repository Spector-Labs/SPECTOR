<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spector • Glasses Mode</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #0F0F0F; color: #E8E8E8; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .glasses-container { height: 100vh; display: flex; flex-direction: column; padding: 32px 48px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .mode-switcher { display: flex; background: #1A1A1A; border-radius: 9999px; padding: 5px; }
        .mode-btn { padding: 8px 20px; border: none; background: transparent; color: #888; font-size: 14px; font-weight: 500; border-radius: 9999px; cursor: pointer; transition: all 0.2s ease; }
        .mode-btn.active { background: #E8D5B7; color: #111; font-weight: 600; }
        .script-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .chunk { font-size: 42px; line-height: 1.45; max-width: 820px; text-align: center; opacity: 0.35; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); padding: 20px 40px; }
        .chunk.active { opacity: 1; color: #E8D5B7; font-weight: 500; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 16px; margin: 24px 0 16px; transition: opacity 0.3s ease; }
        .control-btn { background: #1A1A1A; border: none; color: #E8E8E8; width: 56px; height: 56px; border-radius: 9999px; font-size: 20px; cursor: pointer; transition: all 0.2s ease; }
        .control-btn:active { transform: scale(0.92); background: #333; }
        #play-btn { width: 72px; height: 72px; font-size: 26px; }
        .progress-container { margin-top: 16px; display: flex; align-items: center; gap: 16px; transition: opacity 0.3s ease; }
        .progress-bar { flex: 1; height: 4px; background: #222; border-radius: 9999px; overflow: hidden; }
        .progress-fill { height: 100%; background: #E8D5B7; width: 0%; transition: width 0.3s ease; }
        .time { font-size: 13px; color: #888; min-width: 80px; text-align: right; }
        .speed-presets { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; transition: opacity 0.3s ease; }
        .preset-btn { padding: 8px 18px; background: #1A1A1A; color: #888; border: none; border-radius: 9999px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
        .preset-btn.active { background: #E8D5B7; color: #111; font-weight: 600; }

        .controls.hidden,
        .progress-container.hidden,
        .speed-presets.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .end-screen {
            position: fixed;
            inset: 0;
            background: #0F0F0F;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }
        .end-screen h2 { font-size: 28px; font-weight: 600; color: #E8D5B7; margin-bottom: 8px; }
        .end-screen .subtitle { color: #888; margin-bottom: 40px; }
        .stats { display: flex; gap: 48px; margin-bottom: 48px; }
        .stat { text-align: center; }
        .stat .value { font-size: 28px; font-weight: 600; color: #E8D5B7; }
        .stat .label { font-size: 13px; color: #888; margin-top: 4px; }
        .end-actions { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 280px; }
        .btn-secondary {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.06);
            color: #CCC;
            border: none;
            border-radius: 9999px;
            font-size: 15.5px;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="glasses-container">
        <div class="header">
            <div style="font-size: 20px; font-weight: 600;">Spector</div>
            <div class="mode-switcher">
                <button class="mode-btn active" data-mode="comfort">Comfort</button>
                <button class="mode-btn" data-mode="focus">Focus</button>
            </div>
        </div>

        <div class="speed-presets">
            <button class="preset-btn" data-speed="3200">Slow</button>
            <button class="preset-btn active" data-speed="2600">Medium</button>
            <button class="preset-btn" data-speed="2000">Fast</button>
        </div>

        <div class="script-container" id="script-container"></div>

        <div class="controls">
            <button id="rewind-btn" class="control-btn">⟲</button>
            <button id="play-btn" class="control-btn">▶</button>
            <button id="forward-btn" class="control-btn">⟳</button>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time" id="time-remaining">--:--</div>
        </div>
    </div>

    <script>
        let chunks = [];
        let currentIndex = 0;
        let isPlaying = false;
        let interval = null;
        let currentMode = 'comfort';
        let speed = 2600;
        let startTime = null;
        let hideControlsTimeout = null;

        let breathingRAF = null;
        let breathingStartTime = 0;

        function hybridChunk(text) {
            const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
            let result = [];
            sentences.forEach(sentence => {
                const words = sentence.trim().split(/\s+/);
                if (words.length <= 8) {
                    result.push(sentence.trim());
                } else {
                    for (let i = 0; i < words.length; i += 6) {
                        result.push(words.slice(i, i + 6).join(' '));
                    }
                }
            });
            return result.filter(c => c.length > 0);
        }

        function renderChunks() {
            const container = document.getElementById('script-container');
            container.innerHTML = '';
            chunks.forEach((chunk, index) => {
                const div = document.createElement('div');
                div.className = 'chunk';
                div.textContent = chunk;
                if (index === currentIndex) div.classList.add('active');
                container.appendChild(div);
            });
        }

        function updateActiveChunk() {
            document.querySelectorAll('.chunk').forEach((el, i) => {
                el.classList.toggle('active', i === currentIndex);
            });
            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / chunks.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            const remaining = chunks.length - currentIndex - 1;
            const min = Math.floor((remaining * speed) / 60000);
            const sec = Math.floor(((remaining * speed) % 60000) / 1000);
            document.getElementById('time-remaining').textContent = `${min}:${sec.toString().padStart(2, '0')}`;
        }

        // Breathing + Spatial
        let lastBeta = 0, lastGamma = 0, isFirstOrientation = true;

        function startBreathing() {
            if (breathingRAF) cancelAnimationFrame(breathingRAF);
            breathingStartTime = Date.now();

            function breathe() {
                const activeChunk = document.querySelector('.chunk.active');
                if (!activeChunk || isPlaying || currentMode !== 'comfort') {
                    breathingRAF = null;
                    return;
                }
                const elapsed = (Date.now() - breathingStartTime) / 1000;
                const breath = Math.sin(elapsed * 0.55) * 0.009;
                const drift = Math.sin(elapsed * 0.22) * 1.8;
                activeChunk.style.transform = `translateY(${drift}px) scale(${1 + breath})`;
                breathingRAF = requestAnimationFrame(breathe);
            }
            breathingRAF = requestAnimationFrame(breathe);
        }

        function stopBreathing() {
            if (breathingRAF) {
                cancelAnimationFrame(breathingRAF);
                breathingRAF = null;
            }
            const activeChunk = document.querySelector('.chunk.active');
            if (activeChunk) activeChunk.style.transform = '';
        }

        function showControls() {
            document.querySelector('.controls').classList.remove('hidden');
            document.querySelector('.progress-container').classList.remove('hidden');
            document.querySelector('.speed-presets').classList.remove('hidden');
        }

        function hideControls() {
            if (isPlaying) {
                document.querySelector('.controls').classList.add('hidden');
                document.querySelector('.progress-container').classList.add('hidden');
                document.querySelector('.speed-presets').classList.add('hidden');
            }
        }

        function resetHideTimer() {
            clearTimeout(hideControlsTimeout);
            showControls();
            if (isPlaying) {
                hideControlsTimeout = setTimeout(hideControls, 3000);
            }
        }

        function setupSpatialAnchoring() {
            if (!window.DeviceOrientationEvent) return;

            window.addEventListener('deviceorientation', (event) => {
                if (!isPlaying) {
                    if (currentMode === 'comfort' && !breathingRAF) startBreathing();
                    return;
                }
                stopBreathing();

                let rawBeta = event.beta || 0;
                let rawGamma = event.gamma || 0;
                const alpha = currentMode === 'comfort' ? 0.85 : 0.92;

                if (isFirstOrientation) {
                    lastBeta = rawBeta; lastGamma = rawGamma; isFirstOrientation = false;
                }

                const filteredBeta = alpha * lastBeta + (1 - alpha) * rawBeta;
                const filteredGamma = alpha * lastGamma + (1 - alpha) * rawGamma;
                lastBeta = filteredBeta; lastGamma = filteredGamma;

                const deadzone = currentMode === 'comfort' ? 1.8 : 2.5;
                if (Math.abs(filteredBeta - lastBeta) < deadzone && Math.abs(filteredGamma - lastGamma) < deadzone) return;

                const sensitivity = currentMode === 'comfort' ? 0.42 : 0.22;
                const rot = currentMode === 'comfort' ? 0.28 : 0.12;
                const scale = currentMode === 'comfort' ? 0.0012 : 0.0006;

                const deltaX = (filteredGamma - lastGamma) * sensitivity * 0.55;
                const deltaY = (filteredBeta - lastBeta) * sensitivity * 0.55;
                const deltaRotate = (filteredGamma - lastGamma) * rot;
                const deltaScale = 1 + ((filteredGamma - lastGamma) * scale);

                const active = document.querySelector('.chunk.active');
                if (active) {
                    active.style.transition = currentMode === 'comfort' 
                        ? 'transform 0.55s cubic-bezier(0.23,1,0.32,1)' 
                        : 'transform 0.28s ease-out';
                    active.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(${deltaRotate}deg) scale(${deltaScale})`;
                }
            });
        }

        function startPlayback() {
            if (isPlaying || chunks.length === 0) return;
            isPlaying = true;
            if (!startTime) startTime = Date.now();
            stopBreathing();
            document.getElementById('play-btn').textContent = '⏸';
            resetHideTimer();

            interval = setInterval(() => {
                if (currentIndex < chunks.length - 1) {
                    currentIndex++;
                    updateActiveChunk();
                    if (navigator.vibrate) navigator.vibrate(8);
                } else {
                    stopPlayback();
                    showEndScreen();
                }
            }, speed);
        }

        function stopPlayback() {
            isPlaying = false;
            document.getElementById('play-btn').textContent = '▶';
            if (interval) { clearInterval(interval); interval = null; }
            clearTimeout(hideControlsTimeout);
            showControls();
            if (currentMode === 'comfort') startBreathing();
        }

        function togglePlay() {
            isPlaying ? stopPlayback() : startPlayback();
        }

        function applyMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
            isFirstOrientation = true;
            stopBreathing();
            clearTimeout(hideControlsTimeout);
            showControls();

            if (mode === 'comfort' && !isPlaying) setTimeout(startBreathing, 300);
        }

        function setSpeed(newSpeed, btnElement) {
            speed = newSpeed;
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');

            if (isPlaying) {
                clearInterval(interval);
                interval = setInterval(() => {
                    if (currentIndex < chunks.length - 1) {
                        currentIndex++;
                        updateActiveChunk();
                    } else {
                        stopPlayback();
                        showEndScreen();
                    }
                }, speed);
            }
        }

        function showEndScreen() {
            const totalChunks = chunks.length;
            const timeSpentMs = startTime ? Date.now() - startTime : 0;
            const minutes = Math.floor(timeSpentMs / 60000);
            const seconds = Math.floor((timeSpentMs % 60000) / 1000);
            const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;

            document.querySelector('.glasses-container').innerHTML = `
                <div class="end-screen">
                    <h2>Done reading</h2>
                    <p class="subtitle">Great job finishing your script.</p>

                    <div class="stats">
                        <div class="stat">
                            <div class="value">${totalChunks}</div>
                            <div class="label">Chunks</div>
                        </div>
                        <div class="stat">
                            <div class="value">${timeStr}</div>
                            <div class="label">Time Spent</div>
                        </div>
                    </div>

                    <div class="end-actions">
                        <button onclick="location.reload()" class="btn-primary" style="background:#E8D5B7;color:#111;padding:16px;border-radius:9999px;font-weight:600;border:none;cursor:pointer;">
                            Read Again
                        </button>
                        <button onclick="window.location.href='index.html'" class="btn-secondary">
                            Edit Script
                        </button>
                    </div>
                </div>
            `;
        }

        function init() {
            const script = localStorage.getItem('spectorScript');
            if (!script) {
                document.body.innerHTML = '<div style="padding:40px;text-align:center;">No script found.</div>';
                return;
            }

            chunks = hybridChunk(script);
            renderChunks();
            updateActiveChunk();

            // Mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => btn.addEventListener('click', () => applyMode(btn.dataset.mode)));

            // Speed presets
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', () => setSpeed(parseInt(btn.dataset.speed), btn));
            });

            // Controls
            document.getElementById('play-btn').addEventListener('click', togglePlay);
            document.getElementById('rewind-btn').addEventListener('click', () => { if (currentIndex > 0) currentIndex = Math.max(0, currentIndex - 2); updateActiveChunk(); resetHideTimer(); });
            document.getElementById('forward-btn').addEventListener('click', () => { if (currentIndex < chunks.length - 1) currentIndex++; updateActiveChunk(); resetHideTimer(); });

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
                if (e.key.toLowerCase() === 'r') { if (currentIndex > 0) currentIndex = Math.max(0, currentIndex - 2); updateActiveChunk(); }
            });

            // Tap anywhere to show controls + reset hide timer
            document.addEventListener('click', (e) => {
                if (!['play-btn','rewind-btn','forward-btn'].includes(e.target.id)) {
                    resetHideTimer();
                }
            });

            setupSpatialAnchoring();
            applyMode('comfort');
        }

        window.onload = init;
    </script>
</body>
</html>
