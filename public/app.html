<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spector • Glasses Mode</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #0F0F0F;
            color: #E8E8E8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .glasses-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 60px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .mode-switcher {
            display: flex;
            background: #1A1A1A;
            border-radius: 9999px;
            padding: 6px;
        }

        .mode-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: #888;
            font-size: 15px;
            font-weight: 500;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: #E8D5B7;
            color: #111;
            font-weight: 600;
        }

        .script-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .chunk {
            font-size: 42px;
            line-height: 1.4;
            max-width: 820px;
            text-align: center;
            opacity: 0.35;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            padding: 20px 40px;
        }

        .chunk.active {
            opacity: 1;
            color: #E8D5B7;
            font-weight: 500;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }

        .control-btn {
            background: #1A1A1A;
            border: none;
            color: #E8E8E8;
            width: 64px;
            height: 64px;
            border-radius: 9999px;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn:active {
            transform: scale(0.92);
            background: #333;
        }

        .progress-container {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: #222;
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #E8D5B7;
            width: 0%;
            transition: width 0.3s ease;
        }

        .time {
            font-size: 14px;
            color: #888;
            min-width: 90px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="glasses-container">
        <!-- Header -->
        <div class="header">
            <div style="font-size: 21px; font-weight: 600;">Spector</div>
            
            <div class="mode-switcher">
                <button class="mode-btn active" data-mode="comfort">Comfort</button>
                <button class="mode-btn" data-mode="focus">Focus</button>
            </div>
        </div>

        <!-- Script Area -->
        <div class="script-container" id="script-container">
            <!-- Chunks will be injected here by JavaScript -->
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="rewind-btn" class="control-btn">⟲</button>
            <button id="play-btn" class="control-btn" style="width: 80px; height: 80px; font-size: 28px;">▶</button>
            <button id="forward-btn" class="control-btn">⟳</button>
        </div>

        <!-- Progress -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time" id="time-remaining">--:--</div>
        </div>
    </div>

    <script>
        // === STATE ===
        let chunks = [];
        let currentIndex = 0;
        let isPlaying = false;
        let interval = null;
        let currentMode = 'comfort';
        let speed = 2600; // ms per chunk

        // === GET SCRIPT FROM URL ===
        function getScriptFromURL() {
            const params = new URLSearchParams(window.location.search);
            const encoded = params.get('script');
            if (!encoded) return null;
            try {
                return decodeURIComponent(atob(encoded));
            } catch (e) {
                return null;
            }
        }

        // === HYBRID CHUNKING ===
        function hybridChunk(text) {
            const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
            let result = [];
            
            sentences.forEach(sentence => {
                const words = sentence.trim().split(/\s+/);
                if (words.length <= 8) {
                    result.push(sentence.trim());
                } else {
                    for (let i = 0; i < words.length; i += 6) {
                        result.push(words.slice(i, i + 6).join(' '));
                    }
                }
            });
            return result.filter(c => c.length > 0);
        }

        // === RENDER CHUNKS ===
        function renderChunks() {
            const container = document.getElementById('script-container');
            container.innerHTML = '';
            
            chunks.forEach((chunk, index) => {
                const div = document.createElement('div');
                div.className = 'chunk';
                div.textContent = chunk;
                if (index === currentIndex) div.classList.add('active');
                container.appendChild(div);
            });
        }

        function updateActiveChunk() {
            const allChunks = document.querySelectorAll('.chunk');
            allChunks.forEach((el, i) => {
                el.classList.toggle('active', i === currentIndex);
            });
            
            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / chunks.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            
            // Simple time remaining estimate
            const remainingChunks = chunks.length - currentIndex - 1;
            const minutes = Math.floor((remainingChunks * speed) / 60000);
            const seconds = Math.floor(((remainingChunks * speed) % 60000) / 1000);
            document.getElementById('time-remaining').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // === SPATIAL ANCHORING (Complementary Filter + Deadzone) ===
        let lastBeta = 0;
        let lastGamma = 0;
        let isFirstOrientation = true;

        function setupSpatialAnchoring() {
            if (!window.DeviceOrientationEvent) return;

            window.addEventListener('deviceorientation', (event) => {
                if (!isPlaying) return;

                let rawBeta = event.beta || 0;
                let rawGamma = event.gamma || 0;

                const alpha = currentMode === 'comfort' ? 0.85 : 0.92;

                if (isFirstOrientation) {
                    lastBeta = rawBeta;
                    lastGamma = rawGamma;
                    isFirstOrientation = false;
                }

                const filteredBeta = alpha * lastBeta + (1 - alpha) * rawBeta;
                const filteredGamma = alpha * lastGamma + (1 - alpha) * rawGamma;

                lastBeta = filteredBeta;
                lastGamma = filteredGamma;

                // Deadzone
                const deadzone = currentMode === 'comfort' ? 1.8 : 2.5;
                if (Math.abs(filteredBeta - lastBeta) < deadzone && 
                    Math.abs(filteredGamma - lastGamma) < deadzone) {
                    return;
                }

                // Parallax
                const sensitivity = currentMode === 'comfort' ? 0.42 : 0.22;
                const rotationAmount = currentMode === 'comfort' ? 0.28 : 0.12;
                const scaleAmount = currentMode === 'comfort' ? 0.0012 : 0.0006;

                const deltaX = (filteredGamma - lastGamma) * sensitivity * 0.55;
                const deltaY = (filteredBeta - lastBeta) * sensitivity * 0.55;
                const deltaRotate = (filteredGamma - lastGamma) * rotationAmount;
                const deltaScale = 1 + ((filteredGamma - lastGamma) * scaleAmount);

                const activeChunk = document.querySelector('.chunk.active');
                if (activeChunk) {
                    activeChunk.style.transition = currentMode === 'comfort' 
                        ? 'transform 0.55s cubic-bezier(0.23, 1, 0.32, 1)' 
                        : 'transform 0.28s ease-out';

                    activeChunk.style.transform = `
                        translate(${deltaX}px, ${deltaY}px) 
                        rotate(${deltaRotate}deg) 
                        scale(${deltaScale})
                    `;
                }
            });
        }

        // === PLAYBACK ===
        function startPlayback() {
            if (isPlaying) return;
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸';

            interval = setInterval(() => {
                if (currentIndex < chunks.length - 1) {
                    currentIndex++;
                    updateActiveChunk();
                    
                    // Light haptic feedback
                    if (navigator.vibrate) navigator.vibrate(8);
                } else {
                    stopPlayback();
                    showEndScreen();
                }
            }, speed);
        }

        function stopPlayback() {
            isPlaying = false;
            document.getElementById('play-btn').textContent = '▶';
            clearInterval(interval);
        }

        function togglePlay() {
            isPlaying ? stopPlayback() : startPlayback();
        }

        // === MODE SWITCHING ===
        function applyMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            
            // Reset spatial anchoring when mode changes
            isFirstOrientation = true;
        }

        // === END SCREEN ===
        function showEndScreen() {
            const container = document.querySelector('.glasses-container');
            container.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center;">
                    <div style="font-size:28px; margin-bottom:12px;">Done reading</div>
                    <div style="color:#888; margin-bottom:40px;">You finished your script.</div>
                    
                    <button onclick="location.reload()" 
                            style="background:#E8D5B7; color:#111; border:none; padding:16px 48px; border-radius:9999px; font-size:17px; font-weight:600; cursor:pointer;">
                        Read Again
                    </button>
                </div>
            `;
        }

        // === INITIALIZATION ===
        function init() {
            const script = getScriptFromURL();
            if (!script) {
                document.body.innerHTML = '<div style="padding:40px; text-align:center;">No script provided.</div>';
                return;
            }

            chunks = hybridChunk(script);
            renderChunks();
            updateActiveChunk();

            // Mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    applyMode(btn.dataset.mode);
                });
            });

            // Controls
            document.getElementById('play-btn').addEventListener('click', togglePlay);
            document.getElementById('rewind-btn').addEventListener('click', () => {
                if (currentIndex > 0) currentIndex = Math.max(0, currentIndex - 2);
                updateActiveChunk();
            });
            document.getElementById('forward-btn').addEventListener('click', () => {
                if (currentIndex < chunks.length - 1) currentIndex++;
                updateActiveChunk();
            });

            // Keyboard support
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'k') {
                    e.preventDefault();
                    togglePlay();
                }
                if (e.key.toLowerCase() === 'r') {
                    if (currentIndex > 0) currentIndex = Math.max(0, currentIndex - 2);
                    updateActiveChunk();
                }
            });

            // Spatial anchoring
            setupSpatialAnchoring();

            // Start in Comfort mode
            applyMode('comfort');
        }

        window.onload = init;
    </script>
</body>
</html>
