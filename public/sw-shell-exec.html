<!DOCTYPE html><html><body><pre id="out"></pre><script>
function shellForPath(pathname) {
    if (pathname.endsWith('app.html')) return './app.html';
    if (pathname.endsWith('index.html') || pathname === '/' || pathname.endsWith('/')) return './index.html';
    return null;
}
const cases = [
  ['/app.html', './app.html'],
  ['/index.html', './index.html'],
  ['/foo', null]
];
const results = cases.map(([p, exp]) => ({ path: p, got: shellForPath(p), exp, ok: shellForPath(p) === exp }));
const pass = results.every(r => r.ok);
document.getElementById('out').textContent = JSON.stringify({ pass, results }, null, 2);
document.title = pass ? 'SWShell: PASS' : 'SWShell: FAIL';
</script></body></html>
