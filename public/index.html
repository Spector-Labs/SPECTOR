<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spector • Eyes Forward</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="landing">
    <div class="container">
        <header>
            <div class="logo">Spector<span class="tm">™</span></div>
            <p class="tagline">Eyes Forward.</p>
            <p class="subtitle">The teleprompter for smart glasses.</p>
        </header>

        <div class="input-section">
            <label>Your Script</label>
            <textarea id="script-input" placeholder="Paste your speech, presentation, or notes here..."></textarea>
            
            <div class="file-upload" id="file-area">
                Drop .txt file here or click to browse
                <input type="file" id="file-input" accept=".txt" style="display:none;">
            </div>

            <button id="launch-btn" class="btn-primary">Open in Glasses Mode</button>
        </div>
    </div>

    <script>
        const fileArea = document.getElementById('file-area');
        const fileInput = document.getElementById('file-input');
        const textarea = document.getElementById('script-input');

        fileArea.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => textarea.value = event.target.result;
                reader.readAsText(file);
            }
        });

        fileArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileArea.classList.add('dragover');
        });

        fileArea.addEventListener('dragleave', () => fileArea.classList.remove('dragover'));

        fileArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === "text/plain") {
                const reader = new FileReader();
                reader.onload = (event) => textarea.value = event.target.result;
                reader.readAsText(file);
            }
        });

        document.getElementById('launch-btn').addEventListener('click', () => {
            const text = textarea.value.trim();
            if (!text) {
                alert("Please enter a script first.");
                return;
            }
            localStorage.setItem('spectorScript', text);
            window.location.href = 'app.html';
        });
    </script>
</body>
</html>
