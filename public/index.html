<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spector • Eyes Forward</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <style>
        .landing {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            background: #0F0F0F;
        }
        .container {
            max-width: 620px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 48px;
        }
        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: #E8E8E8;
            margin-bottom: 8px;
        }
        .tm {
            font-size: 0.5em;
            vertical-align: super;
            opacity: 0.5;
        }
        .tagline {
            font-size: 22px;
            color: #E8D5B7;
            font-weight: 600;
            margin: 0 0 8px;
        }
        .subtitle {
            color: #888;
            font-size: 16px;
            max-width: 420px;
            margin: 0 auto;
        }
        .input-section {
            background: #1A1A1A;
            border-radius: 20px;
            padding: 32px;
            border: 1px solid #333;
        }
        .input-section label {
            display: block;
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #111;
            border: 1px solid #444;
            border-radius: 14px;
            padding: 20px;
            color: #E8E8E8;
            font-size: 15.5px;
            resize: vertical;
            margin-bottom: 20px;
            outline: none;
            font-family: inherit;
            line-height: 1.5;
        }
        textarea:focus {
            border-color: #666;
        }
        .file-upload {
            border: 1.5px dashed #555;
            border-radius: 14px;
            padding: 28px 20px;
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
        }
        .file-upload:hover {
            border-color: #777;
            background: rgba(255,255,255,0.015);
        }
        .file-upload.dragover {
            border-color: #E8D5B7;
            background: rgba(232, 213, 183, 0.03);
        }
        .btn-primary {
            width: 100%;
            padding: 18px 24px;
            background: #E8D5B7;
            color: #111;
            border: none;
            border-radius: 9999px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:active {
            transform: scale(0.985);
            background: #D4B98A;
        }
        footer {
            text-align: center;
            margin-top: 48px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>
<body class="landing">
    <div class="container">
        <header>
            <div class="logo">Spector<span class="tm">™</span></div>
            <p class="tagline">Eyes Forward.</p>
            <p class="subtitle">A calm, spatially-aware teleprompter designed for smart glasses.</p>
        </header>

        <div class="input-section">
            <label>Your Script</label>
            <textarea id="script-input" placeholder="Paste your speech, presentation, or notes here..."></textarea>

            <div class="file-upload" id="file-area">
                Drop .txt file here or click to browse
                <input type="file" id="file-input" accept=".txt" style="display:none;">
            </div>

            <button id="launch-btn" class="btn-primary">Open in Glasses Mode</button>
        </div>

        <footer>
            Built for Meta Ray-Ban Display • Works in Developer Mode
        </footer>
    </div>

    <script>
        function initFileUpload() {
            const fileArea = document.getElementById('file-area');
            const fileInput = document.getElementById('file-input');
            const textarea = document.getElementById('script-input');

            fileArea.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file && file.type === "text/plain") {
                    const reader = new FileReader();
                    reader.onload = (event) => textarea.value = event.target.result;
                    reader.readAsText(file);
                }
            });

            fileArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileArea.classList.add('dragover');
            });

            fileArea.addEventListener('dragleave', () => fileArea.classList.remove('dragover'));

            fileArea.addEventListener('drop', (e) => {
                e.preventDefault();
                fileArea.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && file.type === "text/plain") {
                    const reader = new FileReader();
                    reader.onload = (event) => textarea.value = event.target.result;
                    reader.readAsText(file);
                }
            });
        }

        function initLaunchButton() {
            const launchBtn = document.getElementById('launch-btn');
            const textarea = document.getElementById('script-input');

            launchBtn.addEventListener('click', () => {
                const text = textarea.value.trim();
                if (!text) {
                    alert("Please enter a script first.");
                    return;
                }
                localStorage.setItem('spectorScript', text);
                window.location.href = 'app.html';
            });
        }

        function init() {
            initFileUpload();
            initLaunchButton();
        }

        window.onload = init;

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service worker registered'))
                    .catch(err => console.log('Service worker failed', err));
            });
        }
    </script>
</body>
</html>
