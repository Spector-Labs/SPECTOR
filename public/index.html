<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spector™ • Eyes Forward</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body.landing {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0F0F0F;
            padding: 40px 20px;
        }
        .container {
            max-width: 620px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }
        .tm {
            font-size: 0.55em;
            vertical-align: super;
            margin-left: 3px;
            opacity: 0.6;
        }
        .tagline {
            font-size: 21px;
            color: #E8D5B7;
            margin: 0 0 8px;
            font-weight: 600;
        }
        .subtitle {
            color: #888;
            font-size: 15.5px;
            margin-bottom: 48px;
        }
        .input-section {
            background: #1A1A1A;
            border-radius: 20px;
            padding: 32px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .input-section label {
            display: block;
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            height: 180px;
            background: #111;
            border: 1px solid #333;
            border-radius: 14px;
            padding: 18px;
            color: #E8E8E8;
            font-size: 15.5px;
            resize: vertical;
            margin-bottom: 20px;
            outline: none;
            font-family: inherit;
        }
        textarea:focus {
            border-color: #555;
        }
        .file-upload {
            border: 1.5px dashed #444;
            border-radius: 14px;
            padding: 28px 20px;
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
        }
        .file-upload:hover {
            border-color: #666;
            background: rgba(255,255,255,0.015);
        }
        .btn-primary {
            width: 100%;
            padding: 18px 24px;
            background: #E8D5B7;
            color: #111;
            border: none;
            border-radius: 9999px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:active {
            transform: scale(0.985);
            background: #D4B98A;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body class="landing">
    <div class="container">
        <!-- Three.js Floating Glasses -->
        <div id="three-container" style="width: 100%; height: 260px; margin-bottom: 10px;"></div>

        <header style="margin-bottom: 40px;">
            <div class="logo">Spector<span class="tm">™</span></div>
            <p class="tagline">Eyes Forward.</p>
            <p class="subtitle">A calm, spatially-aware teleprompter designed for smart glasses.</p>
        </header>

        <div class="input-section">
            <label>Your Script</label>
            <textarea id="script-input" placeholder="Paste your speech, presentation, or notes here..."></textarea>

            <div class="file-upload" id="file-area">
                Drop .txt file here or click to browse
                <input type="file" id="file-input" accept=".txt" style="display:none;">
            </div>

            <button id="launch-btn" class="btn-primary">Open in Glasses Mode</button>
        </div>

        <div class="footer">
            Built for Meta Ray-Ban Display • Works in Developer Mode
        </div>
    </div>

    <script>
        // ==================== ENHANCED THREE.JS GLASSES ====================
        function initThreeJS() {
            const container = document.getElementById('three-container');
            if (!container) return;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Group for the whole glasses
            const glasses = new THREE.Group();

            // === Gold material (premium feel) ===
            const goldMaterial = new THREE.MeshPhongMaterial({
                color: 0xE8D5B7,
                shininess: 45,
                specular: 0x222222,
                emissive: 0x3a2f1f,
                emissiveIntensity: 0.08
            });

            // === Lens material (subtle dark reflective glass) ===
            const lensMaterial = new THREE.MeshPhongMaterial({
                color: 0x1a1a1a,
                shininess: 90,
                specular: 0x666666,
                transparent: true,
                opacity: 0.65
            });

            // Left frame
            const leftFrame = new THREE.Mesh(
                new THREE.TorusGeometry(1.05, 0.07, 18, 52),
                goldMaterial
            );
            leftFrame.position.x = -1.25;
            glasses.add(leftFrame);

            // Right frame
            const rightFrame = leftFrame.clone();
            rightFrame.position.x = 1.25;
            glasses.add(rightFrame);

            // Left lens (inner)
            const leftLens = new THREE.Mesh(
                new THREE.TorusGeometry(0.82, 0.04, 18, 52),
                lensMaterial
            );
            leftLens.position.x = -1.25;
            glasses.add(leftLens);

            // Right lens (inner)
            const rightLens = leftLens.clone();
            rightLens.position.x = 1.25;
            glasses.add(rightLens);

            // Bridge
            const bridge = new THREE.Mesh(
                new THREE.CylinderGeometry(0.055, 0.055, 1.0, 14),
                goldMaterial
            );
            bridge.rotation.z = Math.PI / 2;
            glasses.add(bridge);

            // Left temple arm
            const leftTemple = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.04, 2.2, 12),
                goldMaterial
            );
            leftTemple.position.set(-2.3, 0, -0.6);
            leftTemple.rotation.set(0, 0.6, 0);
            glasses.add(leftTemple);

            // Right temple arm
            const rightTemple = leftTemple.clone();
            rightTemple.position.x = 2.3;
            rightTemple.rotation.y = -0.6;
            glasses.add(rightTemple);

            scene.add(glasses);

            // === Better Lighting ===
            const ambient = new THREE.AmbientLight(0xffffff, 0.55);
            scene.add(ambient);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x222222, 0.6);
            scene.add(hemiLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
            keyLight.position.set(6, 12, 8);
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xE8D5B7, 0.35);
            fillLight.position.set(-8, -4, -6);
            scene.add(fillLight);

            camera.position.z = 5.5;
            camera.position.y = 0.3;

            // === Elegant Animation ===
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.016;

                // Very calm breathing + floating
                glasses.position.y = Math.sin(time * 0.65) * 0.09;
                
                // Subtle breathing scale (more premium feel)
                const breathe = 1 + Math.sin(time * 0.55) * 0.009;
                glasses.scale.set(breathe, breathe, breathe);

                // Very slow elegant rotation
                glasses.rotation.y = Math.sin(time * 0.22) * 0.18;

                // Gentle tilt (like natural head movement)
                glasses.rotation.x = Math.sin(time * 0.4) * 0.035;

                renderer.render(scene, camera);
            }
            animate();

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }
        // ==================== END ENHANCED THREE.JS ====================

        function initFileUpload() {
            const fileArea = document.getElementById('file-area');
            const fileInput = document.getElementById('file-input');
            const textarea = document.getElementById('script-input');

            fileArea.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => textarea.value = event.target.result;
                    reader.readAsText(file);
                }
            });

            fileArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileArea.classList.add('dragover');
            });
            fileArea.addEventListener('dragleave', () => fileArea.classList.remove('dragover'));
            fileArea.addEventListener('drop', (e) => {
                e.preventDefault();
                fileArea.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && file.type === "text/plain") {
                    const reader = new FileReader();
                    reader.onload = (event) => textarea.value = event.target.result;
                    reader.readAsText(file);
                }
            });
        }

        function initLaunchButton() {
            const launchBtn = document.getElementById('launch-btn');
            const textarea = document.getElementById('script-input');

            launchBtn.addEventListener('click', () => {
                const text = textarea.value.trim();
                if (!text) {
                    alert("Please enter a script first.");
                    return;
                }
                localStorage.setItem('spectorScript', text);
                window.location.href = 'app.html';
            });
        }

        function init() {
            initThreeJS();
            initFileUpload();
            initLaunchButton();

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('service-worker.js')
                        .then(() => console.log('Service worker registered'))
                        .catch(err => console.log('Service worker failed', err));
                });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
